[package]
name = "azork"
version = "0.2.0"
edition = "2021"
description = "AzZork: the Azure control plane reimagined as a Zork-style text adventure."
license = "MIT"
repository = "https://github.com/rysweet/azork"
readme = "README.md"

[[bin]]
name = "azork"
path = "src/main.rs"

[dependencies]
semver = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
flate2 = "1"
tar = "0.4"
ureq = "2"

# Dev-only dependencies used by the update-module TDD tests to build fixtures
# (compute SHA-256 digests, assemble tar.gz archives, parse release JSON, and
# construct semver values). The runtime crate deps are added in the
# implementation step; these only need to be available to the test target.
[dev-dependencies]
semver = "1"
sha2 = "0.10"
flate2 = "1"
tar = "0.4"
serde_json = "1"
