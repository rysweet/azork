[package]
name = "azork"
version = "0.2.0"
edition = "2021"
description = "AzZork: the Azure control plane reimagined as a Zork-style text adventure."
license = "MIT"
repository = "https://github.com/rysweet/azork"
readme = "README.md"

[[bin]]
name = "azork"
path = "src/main.rs"

[features]
# Default build is fully offline and dependency-free: the graph memory uses the
# in-memory `GraphMemory` shim. `persistent` is the opt-in seam for the native
# `lbug`-backed `amplihack-memory` store (wired in a later step); it deliberately
# never links into the default build so `cargo build`/`cargo test` stay light,
# offline, and green.
default = []
persistent = []

[dependencies]
