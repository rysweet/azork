[package]
name = "azork"
version = "0.2.0"
edition = "2021"
description = "AzZork: the Azure control plane reimagined as a Zork-style text adventure."
license = "MIT"
repository = "https://github.com/rysweet/azork"
readme = "README.md"

[[bin]]
name = "azork"
path = "src/main.rs"

[features]
# Default build is fully offline and dependency-free: the graph memory uses the
# in-memory `GraphMemory` shim. `persistent` is the opt-in seam for the native
# `lbug`-backed `amplihack-memory` store (wired in a later step); it deliberately
# never links into the default build so `cargo build`/`cargo test` stay light,
# offline, and green.
default = []
persistent = []
# `agentic` bridges azork's intent resolver into the `recipe-runner-rs` `Adapter`
# seam so ambiguous intents can be resolved by running an amplihack recipe —
# mirroring how Simard and Powderfinger embed the runner. It pulls heavier,
# edition-2024 dependencies, so it is opt-in and never links into the default
# offline build. Enable with `--features agentic`.
agentic = ["dep:recipe-runner-rs", "dep:anyhow"]

[dependencies]
recipe-runner-rs = { path = "../../../../amplihack-recipe-runner", optional = true }
anyhow = { version = "1", optional = true }
