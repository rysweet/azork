[package]
name = "recipe-runner-rs"
version = "0.3.6"
edition = "2024"
description = "Code-enforced YAML workflow execution engine for amplihack"
license = "MIT"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
clap = { version = "4", features = ["derive"] }
anyhow = "1"
thiserror = "2"
regex = "1"
log = "0.4"
env_logger = "0.11"
dirs = "6"
sha2 = "0.10"
hex = "0.4"
uuid = { version = "1", features = ["v4"] }
tempfile = "3"
ureq = "2"
flate2 = "1"
tar = "0.4"
semver = "1"
libc = "0.2.185"
tracing = "0.1.44"

[dev-dependencies]
proptest = "1.10.0"
