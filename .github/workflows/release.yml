name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build & publish release assets
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cross linker (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        # Stamp the running version so the binary self-reports the tag.
        env:
          AZORK_RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive + checksum
        id: package
        run: |
          set -euo pipefail
          triple="${{ matrix.target }}"
          archive="azork-${triple}.tar.gz"
          # Stage the binary under a clean directory so the tar contains just `azork`.
          staging="$(mktemp -d)"
          cp "target/${triple}/release/azork" "${staging}/azork"
          tar -czf "${archive}" -C "${staging}" azork
          sha256sum "${archive}" > "${archive}.sha256"
          echo "archive=${archive}" >> "$GITHUB_OUTPUT"
          echo "checksum=${archive}.sha256" >> "$GITHUB_OUTPUT"
          echo "--- checksum ---"
          cat "${archive}.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
          fail_on_unmatched_files: true
          generate_release_notes: true
