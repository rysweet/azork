repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: local
    hooks:
      # Auto-fixes formatting locally (better DX than failing the commit);
      # `ci.yml` runs `cargo fmt --all -- --check` as the actual gate, so a
      # contributor who skips this hook still gets caught in CI. Intentional
      # divergence, not an oversight.
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: cargo test --workspace --locked
        language: system
        types: [rust]
        pass_filenames: false
